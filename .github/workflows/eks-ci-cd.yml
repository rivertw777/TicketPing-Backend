name: EKS CI/CD Workflow

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: 'eureka-server'
            ecr_repository: 'ticketping/eureka-server'
            dockerfile_path: './eureka-server/Dockerfile'
            context_path: './eureka-server'
            k8s_manifest_path: './kubernetes/eureka-server.yaml'
          - name: 'auth-server'
            ecr_repository: 'ticketping/auth-server'
            dockerfile_path: './services/auth/Dockerfile'
            context_path: './services/auth'
            k8s_manifest_path: './kubernetes/auth-server.yaml'

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test with Gradle Wrapper
        run: ./gradlew build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ matrix.service.ecr_repository }} -f ${{ matrix.service.dockerfile_path }} ${{ matrix.service.context_path }}
          docker push $ECR_REGISTRY/${{ matrix.service.ecr_repository }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Update ConfigMap
        run: |
          touch env-config.yml
          echo "${{ secrets.ENV_CONFIG }}" > env-config.yml
          kubectl apply -f env-config.yml

      - name: Deploy to EKS
        run: |
          kubectl apply -f ${{ matrix.service.k8s_manifest_path }}  
          kubectl rollout status deployment/${{ matrix.service.name }}-deployment -n default