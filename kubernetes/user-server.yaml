apiVersion: v1
kind: Service
metadata:
  name: user-server-service
spec:
  selector:
    app: user-server
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 10011
      targetPort: 10011
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-server-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-server
  template:
    metadata:
      labels:
        app: user-server
    spec:
      containers:
        - name: user-server
          image: 654654346698.dkr.ecr.ap-northeast-2.amazonaws.com/ticketping/user-server:latest
          ports:
            - containerPort: 10011
          env:
            - name: EUREKA_SERVER
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: EUREKA_SERVER
            - name: LOKI_HOST
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: LOKI_HOST
            - name: ZIPKIN
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: ZIPKIN
            - name: USER_POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: USER_POSTGRES_URL
            - name: USER_POSTGRES_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: USER_POSTGRES_USERNAME
            - name: USER_POSTGRES_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: USER_POSTGRES_PASSWORD