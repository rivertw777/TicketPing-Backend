apiVersion: v1
kind: Service
metadata:
  name: order-server-service
spec:
  selector:
    app: order-server
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 10013
      targetPort: 10013
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-server-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-server
  template:
    metadata:
      labels:
        app: order-server
    spec:
      containers:
        - name: order-server
          image: 654654346698.dkr.ecr.ap-northeast-2.amazonaws.com/ticketping/order-server:latest
          ports:
            - containerPort: 10013
          env:
            - name: EUREKA_SERVER
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: EUREKA_SERVER
            - name: REDIS_NODE_1
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_1
            - name: REDIS_NODE_2
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_2
            - name: REDIS_NODE_3
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_3
            - name: REDIS_NODE_4
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_4
            - name: REDIS_NODE_5
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_5
            - name: REDIS_NODE_6
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_6
            - name: KAFKA_BROKER_1
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: KAFKA_BROKER_1
            - name: KAFKA_BROKER_2
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: KAFKA_BROKER_2
            - name: KAFKA_BROKER_3
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: KAFKA_BROKER_3
            - name: LOKI_HOST
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: LOKI_HOST
            - name: ZIPKIN
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: ZIPKIN
            - name: ORDER_POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: ORDER_POSTGRES_URL
            - name: ORDER_POSTGRES_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: ORDER_POSTGRES_USERNAME
            - name: ORDER_POSTGRES_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: ORDER_POSTGRES_PASSWORD