apiVersion: v1
kind: Service
metadata:
  name: order-server-service
spec:
  selector:
    app: order-server
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 10014
      targetPort: 10014
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-server-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-server
  template:
    metadata:
      labels:
        app: payment-server
    spec:
      containers:
        - name: payment-server
          image: 654654346698.dkr.ecr.ap-northeast-2.amazonaws.com/ticketping/payment-server:latest
          ports:
            - containerPort: 10014
          env:
            - name: EUREKA_SERVER
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: EUREKA_SERVER
            - name: KAFKA_BROKER_1
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: KAFKA_BROKER_1
            - name: KAFKA_BROKER_2
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: KAFKA_BROKER_2
            - name: KAFKA_BROKER_3
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: KAFKA_BROKER_3
            - name: LOKI_HOST
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: LOKI_HOST
            - name: ZIPKIN
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: ZIPKIN
            - name: PAYMENT_POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: PAYMENT_POSTGRES_URL
            - name: PAYMENT_POSTGRES_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: PAYMENT_POSTGRES_USERNAME
            - name: PAYMENT_POSTGRES_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: PAYMENT_POSTGRES_PASSWORD
            - name: TOSS_PAYMENT_WIDGET_SECRET_KEY
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: TOSS_PAYMENT_WIDGET_SECRET_KEY
            - name: TOSS_PAYMENT_CONFIRM_URL
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: TOSS_PAYMENT_CONFIRM_URL