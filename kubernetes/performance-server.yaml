apiVersion: v1
kind: Service
metadata:
  name: performance-server-service
spec:
  selector:
    app: performance-server
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 10012
      targetPort: 10012
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: performance-server-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: performance-server
  template:
    metadata:
      labels:
        app: performance-server
    spec:
      containers:
        - name: performance-server
          image: ticketping/performance-server:latest
          ports:
            - containerPort: 10012
          env:
            - name: EUREKA_SERVER
              value: ${EUREKA_SERVER}
            - name: PERFORMANCE_POSTGRES_URL
              value: ${PERFORMANCE_POSTGRES_URL}
            - name: PERFORMANCE_POSTGRES_USERNAME
              value: ${PERFORMANCE_POSTGRES_USERNAME}
            - name: PERFORMANCE_POSTGRES_PASSWORD
              value: ${PERFORMANCE_POSTGRES_PASSWORD}
            - name: REDIS_NODE_1
              value: ${REDIS_NODE_1}
            - name: REDIS_NODE_2
              value: ${REDIS_NODE_2}
            - name: REDIS_NODE_3
              value: ${REDIS_NODE_3}
            - name: REDIS_NODE_4
              value: ${REDIS_NODE_4}
            - name: REDIS_NODE_5
              value: ${REDIS_NODE_5}
            - name: REDIS_NODE_6
              value: ${REDIS_NODE_6}
            - name: LOKI_HOST
              value: ${LOKI_HOST}
            - name: ZIPKIN
              value: ${ZIPKIN}
            - name: DISCORD_WEBHOOK_URL
              value: ${GF_DISCORD_WEBHOOK_URL}