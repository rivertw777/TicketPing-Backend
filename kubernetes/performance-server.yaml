apiVersion: v1
kind: Service
metadata:
  name: performance-server-service
spec:
  selector:
    app: performance-server
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 10012
      targetPort: 10012
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: performance-server-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: performance-server
  template:
    metadata:
      labels:
        app: performance-server
    spec:
      containers:
        - name: performance-server
          image: 654654346698.dkr.ecr.ap-northeast-2.amazonaws.com/ticketping/performance-server:latest
          ports:
            - containerPort: 10012
          env:
            - name: EUREKA_SERVER
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: EUREKA_SERVER
            - name: REDIS_NODE_1
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_1
            - name: REDIS_NODE_2
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_2
            - name: REDIS_NODE_3
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_3
            - name: REDIS_NODE_4
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_4
            - name: REDIS_NODE_5
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_5
            - name: REDIS_NODE_6
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_6
            - name: LOKI_HOST
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: LOKI_HOST
            - name: ZIPKIN
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: ZIPKIN
            - name: PERFORMANCE_POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: PERFORMANCE_POSTGRES_URL
            - name: PERFORMANCE_POSTGRES_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: PERFORMANCE_POSTGRES_USERNAME
            - name: PERFORMANCE_POSTGRES_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: PERFORMANCE_POSTGRES_PASSWORD
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: DISCORD_WEBHOOK_URL