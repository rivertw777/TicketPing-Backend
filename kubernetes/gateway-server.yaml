apiVersion: v1
kind: Service
metadata:
  name: gateway-server-service
spec:
  selector:
    app: gateway-server
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 10001
      targetPort: 10001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-server-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-server
  template:
    metadata:
      labels:
        app: gateway-server
    spec:
      containers:
        - name: gateway-server
          image: 654654346698.dkr.ecr.ap-northeast-2.amazonaws.com/ticketping/gateway-server:latest
          ports:
            - containerPort: 10001
          env:
            - name: EUREKA_SERVER
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: EUREKA_SERVER
            - name: REDIS_NODE_1
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_1
            - name: REDIS_NODE_2
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_2
            - name: REDIS_NODE_3
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_3
            - name: REDIS_NODE_4
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_4
            - name: REDIS_NODE_5
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_5
            - name: REDIS_NODE_6
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: REDIS_NODE_6
            - name: LOKI_HOST
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: LOKI_HOST
            - name: ZIPKIN
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: ZIPKIN
            - name: FRONTEND_APP_URL
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: FRONTEND_APP_URL
            - name: USER_TOKEN_SECRET_KEY
              valueFrom:
                configMapKeyRef:
                  name: env-config
                  key: USER_TOKEN_SECRET_KEY